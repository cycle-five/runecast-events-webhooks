name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  docker-build:
    name: Docker build (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Validate the receiver image builds (no push). The publish-on-merge
      # workflow (image.yml) only runs on master/tags, so this is the
      # pre-merge gate on the workspace-aware Dockerfile.
      - name: Build receiver image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: receiver/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
