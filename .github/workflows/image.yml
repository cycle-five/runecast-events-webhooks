name: Publish Receiver Image

# Build and publish the discord-webhook-receiver OCI image to GHCR.
#
# Triggers:
#   - push to master  → :sha-<sha>, :latest
#   - push of v* tag  → :sha-<sha>, :vX.Y.Z
#
# The workspace docker-compose pulls `ghcr.io/cycle-five/discord-webhook-receiver:latest`.
# The build context is the repo ROOT (the receiver depends on the lib at the
# workspace root via `path = ".."`); the Dockerfile lives at receiver/Dockerfile.

on:
  push:
    branches: [master]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cycle-five/discord-webhook-receiver

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: receiver/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/master' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
